<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <title>GitHub 风格深色示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 32px;
        }

        .logo {
            font-weight: 600;
            font-size: 18px;
            color: #f0f6fc;
        }

        .nav-links a {
            color: #8b949e;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #58a6ff;
        }

        .repo-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 24px;
        }

        .repo-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 6px;
        }

        .repo-card p {
            color: #8b949e;
            font-size: 14px;
        }

        .repo-meta {
            margin-top: 12px;
            font-size: 12px;
            color: #8b949e;
            display: flex;
            gap: 16px;
        }

        .repo-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn {
            background: #238636;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #2ea043;
        }

        .footer {
            margin-top: 40px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
            text-align: center;
            font-size: 12px;
            color: #484f58;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <div class="nav-links">
                <a href="#">探索</a>
                <a href="#">关于</a>
                <a href="#">登录</a>
            </div>
        </nav>

        <button class="btn">New Issue</button>

        <footer class="footer">
            &copy; 2026 · 基于 <a href="#">GitHub 设计</a>
        </footer>
    </div>
</body>
</html>
